[profile.default]
evm_version = 'cancun'
src = 'src'
out = 'out'
libs = ['dependencies']
ffi = true
ast = true
build_info = true
extra_output = ['storageLayout']
auto_detect_solc = true

[soldeer]
remappings_generate = false

[dependencies]
forge-std = "1.16.2"
"@openzeppelin-contracts" = { version = "5.6.1", git = "https://github.com/OpenZeppelin/openzeppelin-contracts.git", rev = "5fd1781b1454fd1ef8e722282f86f9293cacf256" }
