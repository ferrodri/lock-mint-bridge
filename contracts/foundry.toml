[profile.default]
evm_version = 'cancun'
src = 'src'
out = 'out'
libs = ['dependencies']
ffi = true
ast = true
build_info = true
extra_output = ['storageLayout']
auto_detect_solc = true

[rpc_endpoints]
op-sepolia = "${CHAIN_A_RPC_URL}"
base-sepolia = "${CHAIN_B_RPC_URL}"

[etherscan]
op-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155420 }
base-sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }

[soldeer]
remappings_generate = false

[dependencies]
forge-std = "1.16.2"
"@openzeppelin-contracts" = { version = "5.6.1", git = "https://github.com/OpenZeppelin/openzeppelin-contracts.git", rev = "5fd1781b1454fd1ef8e722282f86f9293cacf256" }
